services:
  db:
    image: postgres:16-alpine
    container_name: twirly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twirly
      POSTGRES_PASSWORD: twirly
      POSTGRES_DB: twirly
    ports:
      - "7432:5432"
    volumes:
      - twirly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twirly -d twirly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  twirly_pgdata:
